schema: spec-driven

context: |
  # worklane — project context

  worklane is a small, Rust-native async background job runner for Rust web
  services. Tagline: "Typed background jobs for Rust services." It lets services
  enqueue typed jobs and run workers with retries, ack/fail semantics,
  dead-lettering, and pluggable brokers. Inspired by Celery but intentionally
  smaller — do NOT treat it as a Celery clone.

  ## Core principle: protect the core loop
  The whole design protects this loop; everything else is backlog:
    typed payload -> envelope -> broker reserve -> dispatch by kind
                  -> run handler -> ack / retry / fail / dead-letter

  ## v0.1 scope (MVP)
  In scope: typed job enqueue; worker registers handlers; a Broker trait; an
  in-memory broker; ack / retry / fail; a basic retry policy; dead-letter after
  max attempts; tokio async; serde payload (de)serialization; tracing logs; a
  README example; basic tests.

  Out of scope for v0.1 (see BACKLOG.md): Redis/Postgres/NATS/SQS brokers,
  cron/scheduled jobs, priority queue, result backend, dashboard, workflow
  chaining, batch jobs, rate limiting, per-job concurrency limits, multiple
  lanes, job cancellation, dedup, OpenTelemetry, CLI, admin UI, distributed
  scheduler. Reject scope creep into these unless explicitly justified.

  ## Architecture
  Cargo workspace (edition 2024). v0.1 crates:
   - worklane-core: JobId, JobEnvelope, NewJob, the Broker trait, the typed Job
     trait, and the error type. The broker stores OPAQUE envelopes (bytes
     payload) and must NOT know Rust handler types.
   - worklane-memory: in-memory Broker implementation for dev/tests.
   - worklane: facade — Client, Worker, handler registry keyed by job kind.
  Stack: tokio async, serde payloads, tracing logs, async-trait for async trait
  methods. Terminology: prefer "lane" over "queue" where it fits the brand.

  ## Semantics to decide deliberately (in design.md, not improvised in code)
   - reservation lease / visibility timeout when a worker crashes mid-job
   - retry delay policy (fixed vs backoff)
   - worker concurrency model (single loop vs N concurrent handlers)
   - dead-letter storage shape
   - error type design

  ## References (read these)
   - AGENTS.md — OpenSpec workflow, commit convention, Definition of Done
   - docs/architecture.md — architecture overview
   - BACKLOG.md — deferred features
