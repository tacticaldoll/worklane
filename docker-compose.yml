# Local Postgres + Redis for the durable-broker tests. Same images, credentials,
# and behavior as the CI service containers (.github/workflows/rust.yml), so a
# local run reproduces CI; only the HOST ports are shifted (55432/56379, not the
# defaults 5432/6379) so this never collides with a Postgres/Redis you already run
# locally. `docker compose up -d --wait` starts them; the durable-backend
# conformance/poison/retention tiers then run instead of skipping.
#
# The credentials are NON-SECRET — a throwaway test database reachable only on
# localhost — so they are intentionally inline, not a managed secret.
#
# Easiest path:  just test-live      (starts these, exports the URLs, runs the suite)
# Manual path:   docker compose up -d --wait
#                set -a; source .env.example; set +a
#                cargo test --workspace
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: worklane
      POSTGRES_PASSWORD: worklane
      POSTGRES_DB: worklane
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worklane"]
      interval: 2s
      timeout: 3s
      retries: 15
  redis:
    image: redis:7
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
